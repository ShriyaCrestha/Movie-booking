<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login-Cine-account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Reg box">
        <h1> Welcome to the world of Entertainment!📽️</h1>

        <h2>Create an account</h2>

    <div class="contains">
        <label>Name:</label>
        <input type="text" id="name" placeholder="Enter your name">
        <label>Email:</label>
        <input type="text" id="email" placeholder="abc@gmail.com">
    </div>
    <div class="contains">
        <label>Password:</label>
        <input type="password" id="pass" placeholder="Min 6 characters">
        <label>Confirm Password:</label>
        <input type="password" id="re" placeholder="Repeat the password">
        <button  onclick="Create()">Create Account</button>
        </div>
    <p id="error-msg"></p>
    <p id="success-msg"></p>
    <p class="account">Already has an account? <a href="login.html">Login here</a></p>
    </div>
    <script src="script.js"></script>
</body>
</html>
