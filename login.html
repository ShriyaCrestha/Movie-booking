<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="Reg box">
        <h1>Welcome to Cine-hood🎞️</h1>
        <h2>Login to your account</h2>
        <div class="contains">
            <label>Name</label>
            <input type="text" id="name" placeholder="Enter your name">
            <label>Email</label>
            <input type="text" id="email" placeholder="abc@gmail.com">
            <label>Password</label>
            <input type="password" id="pass" placeholder="Min 6 characters">
            <button type="button" onclick="login()">Login</button>
        </div>
        <p id="login-error"></p>
        <p id="login-success"></p>
        <p class="account">Don't have an account? <a href="register.html">Register here</a></p>
        </div>
        <script src="script.js"></script>
</body>
</html>
